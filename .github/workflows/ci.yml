name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run i18n:check
      - run: npm run test:all
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  e2e:
    runs-on: ubuntu-latest
    # Smoke coverage only — keep non-blocking until it has proven stable in CI.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
        env:
          NEXT_TELEMETRY_DISABLED: "1"
